services:
  - type: web
    name: loopforge-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: LOOPFORGE_API_KEY
        sync: false
      - key: PYTHONPATH
        value: /app/src:/app/backend
