name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - "vercel.json"
      - ".github/workflows/deploy.yml"

concurrency:
  group: loopforge-demo-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci-gate:
    uses: ./.github/workflows/ci.yml

  deploy-demo:
    name: Deploy demo (Vercel)
    needs: ci-gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel
        working-directory: demo
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ] || [ -z "${VERCEL_ORG_ID}" ] || [ -z "${VERCEL_PROJECT_ID}" ]; then
            echo "::warning::VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID not fully configured"
            echo "Manual fallback: cd demo && vercel --prod"
            exit 0
          fi
          npx vercel@latest deploy --prod --token "${VERCEL_TOKEN}" --yes
